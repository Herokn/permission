server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: permission-center
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:permission}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

swagger:
  # 生产勿开启；本地可设 SWAGGER_ENABLED=true 或激活 dev 配置
  enabled: ${SWAGGER_ENABLED:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,info}
  endpoint:
    health:
      # 未认证仅看状态；认证后可看详情（生产可改为 always 并配合网关鉴权）
      show-details: ${ACTUATOR_HEALTH_SHOW_DETAILS:when_authorized}
  info:
    env:
      enabled: true

info:
  app:
    name: Permission Center
    version: 1.0.0
    description: 统一权限管理平台

logging:
  level:
    com.permission: ${LOG_LEVEL:INFO}

auth:
  jwt:
    secret: ${JWT_SECRET:permission-center-default-jwt-secret-key-2024}
    access-token-expire: 7200000
    refresh-token-expire: 604800000
    issuer: permission-center
  users:
    admin: ${AUTH_ADMIN_PASS:admin123}
    user1: ${AUTH_USER1_PASS:user123}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

cookie:
  # 仅 HTTPS 部署请设 COOKIE_SECURE=true；生产可激活 spring.profiles.active=prod
  secure: ${COOKIE_SECURE:false}
  same-site: ${COOKIE_SAME_SITE:Lax}

permission:
  # 兼容旧 JWT（sub=admin）与新版（sub=sys_admin）；重新登录后一般为 sys_admin
  super-admins: ${PERMISSION_SUPER_ADMINS:sys_admin,admin}
  org-max-depth: ${PERMISSION_ORG_MAX_DEPTH:20}
