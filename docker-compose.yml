# 后端：由根目录 Dockerfile 在镜像内执行 Maven 打包（mvn clean package），本机无需安装 mvn。
# 构建：docker compose build backend
# 启动：docker compose up -d（首次会拉镜像并构建）
# 数据库：首次启动 MySQL 空数据卷时自动执行 docker/mysql/01-load-full.sh 导入 init_full.sql
services:
  mysql:
    image: mysql:8.0.34
    container_name: permission-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_DATABASE: permission
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 完整初始化（仅空库执行一次）；init 脚本见 docker/mysql/01-load-full.sh
      - ./permission-bootstrap/src/main/resources/db/init_full.sql:/init-full.sql:ro
      - ./docker/mysql/01-load-full.sh:/docker-entrypoint-initdb.d/01-load-full.sh:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - permission-network

  redis:
    image: redis:latest
    container_name: permission-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - permission-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: permission-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/permission?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # 与 application.yml 一致：使用 init_full.sql 初始化，不用 Flyway
      SPRING_FLYWAY_ENABLED: "false"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      AUTH_ADMIN_PASS: ${AUTH_ADMIN_PASS:-}
      AUTH_USER1_PASS: ${AUTH_USER1_PASS:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - permission-network

  frontend:
    build:
      context: ./permission-web-frontend
      dockerfile: Dockerfile.frontend
    container_name: permission-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - permission-network

networks:
  permission-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
